# ============================================================
#  mosquitto.conf — DED-Monitor
#  Compatible Mosquitto v2.x (allow_anonymous requis en v2+)
# ============================================================
 
# ── Listener MQTT standard (ESP32 + backend Python)
listener 1883
protocol mqtt
allow_anonymous true
 
# ── Listener WebSockets (navigateur web via mqtt.js)
listener 9091
protocol websockets
allow_anonymous true